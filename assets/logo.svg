<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="othoni">
  <title>othoni</title>

  <defs>
    <!-- Soft halo behind the rings — gives the logo presence on both light
         (white) and dark (#0d1117) GitHub themes without needing a variant. -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#5b8cff" stop-opacity="0.32" />
      <stop offset="55%"  stop-color="#5b8cff" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#5b8cff" />
      <stop offset="100%" stop-color="#4477ff" />
    </linearGradient>
  </defs>

  <!-- Ambient halo -->
  <circle cx="128" cy="128" r="124" fill="url(#halo)" />

  <!-- Outer scan ring — dashed, suggests live sampling / radar sweep -->
  <circle cx="128" cy="128" r="100" fill="none"
          stroke="#5b8cff" stroke-opacity="0.45"
          stroke-width="2" stroke-dasharray="3 6"
          stroke-linecap="round" />

  <!-- Mid ring — heavy, the dominant 'O' shape -->
  <circle cx="128" cy="128" r="62" fill="none"
          stroke="url(#brand)" stroke-opacity="0.92"
          stroke-width="8" />

  <!-- Solid core — the 'current value' -->
  <circle cx="128" cy="128" r="20" fill="url(#brand)" />

  <!-- Single live data-point on the outer ring (NE), a small visual hook
       that distinguishes the icon from generic concentric circles. -->
  <circle cx="208.6" cy="76"  r="7" fill="#5b8cff" />
  <circle cx="208.6" cy="76"  r="13" fill="none"
          stroke="#5b8cff" stroke-opacity="0.35" stroke-width="2" />
</svg>
