<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="othoni">
  <title>othoni</title>

  <defs>
    <!-- Soft halo behind the mark — gives the logo presence on both light
         (white) and dark (#0d1117) GitHub themes without needing a variant. -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#5b8cff" stop-opacity="0.32" />
      <stop offset="55%"  stop-color="#5b8cff" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7aa4ff" />
      <stop offset="100%" stop-color="#4477ff" />
    </linearGradient>
  </defs>

  <!-- Ambient halo -->
  <circle cx="128" cy="128" r="124" fill="url(#halo)" />

  <!-- Soft outer ring — matches the in-app <Logo /> ring -->
  <circle cx="128" cy="128" r="106" fill="none"
          stroke="url(#brand)" stroke-opacity="0.55"
          stroke-width="6" />

  <!-- EKG pulse trace. Same path as the in-app Logo, scaled from
       24×24 → 256×256 (factor ≈ 10.67) so the mark and the favicon
       share the exact same silhouette. -->
  <path d="M 37 128 L 85 128 L 107 96 L 128 165 L 149 69 L 171 128 L 219 128"
        fill="none" stroke="url(#brand)" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round" />
</svg>
